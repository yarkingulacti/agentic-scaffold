name: Publish

# Trigger model (deterministic per release):
#   push to master      -> quality only (CI gate for merges / the release commit)
#   push of a v* tag     -> quality, then publish + wiki in parallel
# The branch and the tag MUST arrive as two SEPARATE push events, otherwise
# GitHub may collapse a simultaneous branch+tag push into a single branch-ref
# run and skip publish/wiki. `pnpm run release:push` guarantees the split.

on:
  push:
    branches:
      - master
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm run typecheck

      - name: Biome lint + format
        run: pnpm run lint && pnpm run format:check

      - name: Validate skills + templates
        run: pnpm run validate-skills && pnpm run validate-templates

      - name: Fallow codebase intelligence
        run: pnpm run fallow:ci

      - name: Run tests
        run: pnpm test

  publish:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish to npmjs.org
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  wiki:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Renders docs/wiki/ (+ a Changelog mirror) and pushes to the project wiki.
      # The script needs only Node built-ins, so no dependency install is needed.
      # Non-strict by default: until the wiki's first page is created once via the
      # GitHub UI, the push is a logged no-op instead of a failed release.
      - name: Sync wiki
        run: node bin/sync-wiki.mjs
        env:
          AGENTIC_WIKI_REMOTE: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
